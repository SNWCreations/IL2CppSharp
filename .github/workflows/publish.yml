name: Publish Package

on:
  workflow_dispatch:
    inputs:
      publish_to_nuget:
        description: 'Also publish to NuGet.org after int.nugettest.org succeeds'
        required: true
        default: false
        type: boolean

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore IL2CppSharp.csproj

      - name: Build
        run: dotnet build IL2CppSharp.csproj --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Pack
        run: dotnet pack IL2CppSharp.csproj --configuration Release --no-build --output artifacts/package /p:ContinuousIntegrationBuild=true

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: il2cppsharp-package
          path: artifacts/package/*.nupkg
          if-no-files-found: error

  publish-test:
    needs: build
    runs-on: windows-latest
    environment: nuget-test
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: il2cppsharp-package
          path: artifacts/package

      - name: NuGet test login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER || vars.NUGET_USER }}
          token-service-url: https://int.nugettest.org/api/v2/token
          audience: https://int.nugettest.org

      - name: Publish to NuGet test environment
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/package/*.nupkg | Select-Object -First 1
          dotnet nuget push $package.FullName --source "https://apiint.nugettest.org/v3/index.json" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate

  publish-nuget:
    if: ${{ inputs.publish_to_nuget }}
    needs: publish-test
    runs-on: windows-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: il2cppsharp-package
          path: artifacts/package

      - name: NuGet.org login
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER || vars.NUGET_USER }}

      - name: Publish to NuGet.org
        shell: pwsh
        run: |
          $package = Get-ChildItem artifacts/package/*.nupkg | Select-Object -First 1
          dotnet nuget push $package.FullName --source "https://api.nuget.org/v3/index.json" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate
