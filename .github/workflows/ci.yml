name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore IL2CppSharp.csproj

      - name: Build
        run: dotnet build IL2CppSharp.csproj --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Pack
        run: dotnet pack IL2CppSharp.csproj --configuration Release --no-build --output artifacts/package /p:ContinuousIntegrationBuild=true

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: il2cppsharp-package
          path: artifacts/package/*.nupkg
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: artifacts/package/*.nupkg
